# PAM configuration file for hyprlock
# the 'login' configuration file (see /etc/pam.d/login)

# ~/.config/hypr/hyprlock.conf

background {
    monitor =
    path = screenshot               # Captures screen background natively
    blur_passes = 2                 # Adds an elegant background blur
    blur_size = 7
    color = rgba(25, 20, 20, 1.0)
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.25 
    dots_spacing = 0.15 
    dots_center = true
    fade_on_empty = false
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 50
    font_family = Noto Sans
    position = 0, 80
    halign = center
    valign = center
}

